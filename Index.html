<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion</title>
    <link rel="shortcut icon" href="image/Logo.png" type="image/x-icon">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('../image/wallpaper.gif');
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }
    </style>
</head>

<body>
    <div id="loginForm">
        <img src="image/Logo.png" alt="Logo de Falabella">
        <h2>Iniciar Sesión</h2>
        <form id="formulario" onsubmit="return validarForm()">
            <input type="text" id="usuario" placeholder="Usuario" required><br><br>
            <input type="password" id="contrasena" placeholder="Contraseña" required><br><br>
            <button type="submit">Iniciar Sesión</button>
        </form>
    </div>

    <script src="js/app-login.js"></script>
</body>

</html>
