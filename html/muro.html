<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro Digital con PowerPoint</title>

    <!-- Incluye los archivos CSS de Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            <!-- Muro Digital -->
            <div class="jumbotron">
                <h1>Muro Digital</h1>
                <p>Este es tu muro digital donde puedes mostrar contenido adicional.</p>
            </div>
        </div>
        <div class="col-md-6">
            <!-- Presentación de PowerPoint (Office Web Viewer) -->
            <iframe src="https://view.officeapps.live.com/op/embed.aspx?src=wall" frameborder="0" width="100%" height="500px"></iframe>
        </div>
    </div>
</div>

<!-- Incluye los archivos JavaScript de Bootstrap y jQuery (opcional) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
